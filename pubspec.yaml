name: id_ocr
description: "A Flutter plugin for CNIC OCR with Urdu and Sindhi support."
version: 0.1.0
homepage: https://github.com/abulkalamjaan/Flutter-Card-Detection-OCR
repository: https://github.com/abulkalamjaan/Flutter-Card-Detection-OCR

environment:
  sdk: ^3.10.8
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  google_mlkit_document_scanner: ^0.4.1
  google_mlkit_text_recognition: ^0.14.0
  tesseract_ocr: ^0.5.0
  path_provider: ^2.1.5
  path: ^1.9.1
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/tessdata/
    - assets/tessdata_config.json
